services:
  mailhog:
    image: jcalonso/mailhog:v1.0.1
    environment:
      SMTP_HOST: mailhog
      SMTP_PASS: password
      SMTP_PORT: '1025'
      SMTP_SECURE: 'false'
      SMTP_SENDER: hasura-auth@example.com
      SMTP_USER: user
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    labels:
      traefik.enable: 'true'
      traefik.http.routers.mailhog.entrypoints: web
      traefik.http.routers.mailhog.rule: Host(`${MAILHOG_URL}`)
      traefik.http.routers.mailhog.service: mailhog
      traefik.http.routers.mailhog.tls: 'false'
      traefik.http.services.mailhog.loadbalancer.server.port: '8025'
    restart: always
    volumes:
      - type: volume
        source: mailhog
        target: /maildir
